spring.datasource.url=jdbc:mysql://localhost:3306/ocp_epierrage?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Casablanca
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080
server.servlet.context-path=/api

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.jwt.secret=ocpEpierrageSecretKey2026VeryLongKeyForHMAC512AlgorithmMinimum64Chars
app.jwt.expiration=86400000